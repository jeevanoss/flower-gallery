<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Flower Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css">
<style>
  :root {
    --green:    #2d6a4f;
    --green-lt: #52b788;
    --cream:    #faf8f3;
    --card:     #ffffff;
    --ink:      #1a1a1a;
    --muted:    #6b7280;
    --border:   #e8e4dc;
    --tag-bg:   #eef7f1;
    --tag-txt:  #1b5e3b;
    --fav:      #e63946;
    --radius:   14px;
    --shadow:   0 2px 16px rgba(0,0,0,0.07);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--green);
    padding: 28px 24px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1200px;
    margin: 0 auto 18px;
  }

  .site-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 4vw, 32px);
    color: #fff;
    letter-spacing: -0.3px;
  }

  .site-title em { font-style: italic; color: var(--green-lt); }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 16px; border-radius: 8px; font-size: 13px;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    border: none; cursor: pointer; text-decoration: none;
    transition: opacity .15s, transform .1s;
  }
  .btn:hover { opacity: .85; transform: translateY(-1px); }
  .btn-white { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.25); }
  .btn-upload { background: var(--green-lt); color: #fff; }

  /* ── CONTROLS ── */
  .controls {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.6);
    pointer-events: none;
  }

  #searchBox {
    width: 100%;
    padding: 9px 12px 9px 36px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.12);
    color: #fff;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }

  #searchBox::placeholder { color: rgba(255,255,255,0.5); }
  #searchBox:focus { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4); }

  #sortSelect {
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.12);
    color: #fff;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    outline: none;
  }

  #sortSelect option { background: var(--green); }

  /* ── FILTERS ── */
  .filters-wrap {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 113px;
    z-index: 90;
  }

  .filters {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    padding: 12px 0;
    scrollbar-width: none;
  }

  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--green-lt); color: var(--green); }
  .filter-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

  /* ── MAIN ── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  .gallery-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .count-label {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  /* ── GRID ── */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: transform .2s, box-shadow .2s;
    animation: fadeUp .35s ease both;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-img-wrap {
    position: relative;
    overflow: hidden;
    height: 220px;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform .4s ease;
    display: block;
  }

  .card:hover .card-img-wrap img { transform: scale(1.05); }

  .fav-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform .15s, background .15s;
    font-size: 16px;
    backdrop-filter: blur(4px);
  }

  .fav-btn:hover { transform: scale(1.15); background: #fff; }
  .fav-btn.saved { background: var(--fav); }
  .fav-btn.saved svg { color: #fff; }

  .card-body { padding: 14px 16px 16px; }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .card-species {
    font-size: 12px;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .card-meta {
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
    align-items: center;
  }

  .card-meta span { display: flex; align-items: center; gap: 4px; }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }

  .tag {
    background: var(--tag-bg);
    color: var(--tag-txt);
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }

  .tag-loading {
    background: #f3f4f6;
    color: var(--muted);
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-style: italic;
  }

  /* ── STATES ── */
  .state-box {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .state-box .icon { font-size: 48px; margin-bottom: 16px; }
  .state-box p { font-size: 15px; }

  .loading-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .skeleton {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .skeleton-img  { height: 220px; background: #f0ede8; }
  .skeleton-body { padding: 14px 16px 16px; }
  .skeleton-line {
    height: 14px;
    background: #f0ede8;
    border-radius: 4px;
    margin-bottom: 10px;
  }
  .skeleton-line.short { width: 55%; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: .6; }
  }

  /* ── LIGHTGALLERY CAPTION ── */
  .lg-sub-html h4 { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 4px; }
  .lg-sub-html p  { font-size: 13px; opacity: .75; margin: 2px 0; }

  @media (max-width: 600px) {
    header { padding: 16px 16px 14px; }
    .filters-wrap { top: 101px; }
    .header-top { margin-bottom: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="site-title">🌸 My <em>Flower</em> Gallery</div>
    <div class="header-actions">
      <a href="index.html" class="btn btn-white">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Home
      </a>
      <a href="upload.html" class="btn btn-upload">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
        Upload
      </a>
    </div>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchBox" placeholder="Search flowers, places...">
    </div>
    <select id="sortSelect">
      <option value="latest">Latest first</option>
      <option value="oldest">Oldest first</option>
      <option value="name">A → Z</option>
    </select>
  </div>
</header>

<div class="filters-wrap">
  <div class="filters" id="filters"></div>
</div>

<main>
  <div class="gallery-meta">
    <span class="count-label" id="countLabel">Loading...</span>
  </div>
  <div id="gallery" class="gallery"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/lightgallery.min.js"></script>
<script>
const API      = "/api/flowers";
const gallery  = document.getElementById("gallery");
const filters  = document.getElementById("filters");
const search   = document.getElementById("searchBox");
const sortSel  = document.getElementById("sortSelect");
const countLbl = document.getElementById("countLabel");

let allFlowers    = [];
let currentFilter = "all";
let lgInstance    = null;

// ── Fetch ────────────────────────────────────────────────────────────────────
async function loadFlowers() {
  showSkeletons();
  try {
    const res  = await fetch(API);
    allFlowers = await res.json();
    buildFilters();
    render();
  } catch (e) {
    gallery.innerHTML = `<div class="state-box"><div class="icon">🌧</div><p>Could not load flowers.<br>Check your API connection.</p></div>`;
    countLbl.textContent = "";
  }
}

// ── Filters ──────────────────────────────────────────────────────────────────
function buildFilters() {
  const favCount   = allFlowers.filter(f => f.is_fav).length;
  const categories = [...new Set(allFlowers.map(f => f.category).filter(Boolean))].sort();
  const items      = ["all", "favorites", ...categories];

  filters.innerHTML = "";
  items.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (cat === currentFilter ? " active" : "");

    if (cat === "all")       btn.textContent = `All (${allFlowers.length})`;
    else if (cat === "favorites") btn.textContent = `❤️ Favorites (${favCount})`;
    else btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);

    btn.onclick = () => { currentFilter = cat; buildFilters(); render(); };
    filters.appendChild(btn);
  });
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  if (lgInstance) { lgInstance.destroy(); lgInstance = null; }
  gallery.innerHTML = "";

  const q = search.value.toLowerCase();
  let items = allFlowers.filter(f => {
    if (currentFilter === "favorites" && !f.is_fav) return false;
    if (currentFilter !== "all" && currentFilter !== "favorites" && f.category !== currentFilter) return false;
    if (q && !f.name.toLowerCase().includes(q) && !f.location.toLowerCase().includes(q) &&
             !(f.species||"").toLowerCase().includes(q)) return false;
    return true;
  });

  const sort = sortSel.value;
  items.sort((a, b) => {
    if (sort === "latest")  return new Date(b.date) - new Date(a.date);
    if (sort === "oldest")  return new Date(a.date) - new Date(b.date);
    if (sort === "name")    return a.name.localeCompare(b.name);
  });

  countLbl.textContent = `${items.length} flower${items.length !== 1 ? "s" : ""}`;

  if (items.length === 0) {
    gallery.innerHTML = `<div class="state-box"><div class="icon">🔍</div><p>No flowers match your search.</p></div>`;
    return;
  }

  const tags = (f) => {
    const arr = typeof f.tags === "string" ? JSON.parse(f.tags || "[]") : (f.tags || []);
    if (arr.length === 0) return `<span class="tag-loading">AI tagging…</span>`;
    return arr.map(t => `<span class="tag">${t}</span>`).join("");
  };

  items.forEach((f, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${i * 40}ms`;
    card.innerHTML = `
      <div class="card-img-wrap">
        <a href="${f.image_url}" class="img-link"
          data-sub-html="<h4>${f.name}</h4><p>${f.species || ""}</p><p>📍 ${f.location} · 📅 ${formatDate(f.date)}</p>">
          <img src="${f.image_url}" alt="${f.name}" loading="lazy">
        </a>
        <button class="fav-btn ${f.is_fav ? "saved" : ""}" data-id="${f.id}" aria-label="Toggle favorite">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="${f.is_fav ? 'currentColor' : 'none'}"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
      </div>
      <div class="card-body">
        <div class="card-name">${f.name}</div>
        <div class="card-species">${f.species || "&nbsp;"}</div>
        <div class="card-meta">
          <span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${f.location}
          </span>
          <span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${f.date}
          </span>
        </div>
        <div class="tags">${tags(f)}</div>
      </div>
    `;
    gallery.appendChild(card);
  });

  lgInstance = lightGallery(gallery, {
    selector: ".img-link",
    subHtmlSelectorRelative: true
  });
}
function formatDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-IN", { day: "numeric", month: "long", year: "numeric" });
}
// ── Favorite toggle ───────────────────────────────────────────────────────────
document.addEventListener("click", async (e) => {
  const btn = e.target.closest(".fav-btn");
  if (!btn) return;

  const id  = btn.dataset.id;
  const res = await fetch("/api/flowers/fav", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ flower_id: id })
  });
  const data = await res.json();

  const flower = allFlowers.find(f => f.id === id);
  if (flower) flower.is_fav = data.saved ? 1 : 0;

  buildFilters();
    
  render();
});

// ── Skeletons ─────────────────────────────────────────────────────────────────
function showSkeletons() {
  gallery.innerHTML = Array.from({ length: 6 }).map(() => `
    <div class="skeleton">
      <div class="skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton-line"></div>
        <div class="skeleton-line short"></div>
        <div class="skeleton-line short"></div>
      </div>
    </div>`).join("");
}

search.addEventListener("input", render);
sortSel.addEventListener("change", render);

loadFlowers();

// Auto-refresh every 30s to pick up new AI tags
setInterval(loadFlowers, 30000);
</script>
</body>
</html>
